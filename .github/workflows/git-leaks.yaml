name: Gitleaks Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  gitleaks:
    name: Detect Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          URL="https://github.com/gitleaks/gitleaks/releases/download/v8.30.1"
          curl -sSL "$URL/gitleaks_8.30.1_linux_x64.tar.gz" | tar -xz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: |
          gitleaks detect \
            --config .gitleaks.toml \
            --source . \
            --redact \
            --verbose
